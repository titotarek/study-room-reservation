events {}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;
        # This tells Nginx where your index.php is
        root /app/public;
        index index.php;

        # This line fulfills Lecture 3, Slide 5: it routes 
        # everything to the Application Entry Point (index.php)
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            # Using $document_root is more flexible and professional
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}